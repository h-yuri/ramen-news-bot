# ── アクセス保護（GitHub Pages 用の簡易パスワードゲート）──
# hash = SHA-256("ユーザーID:パスワード")。平文はここには置かない。
# パスワード変更時は次で再計算:
#   python -c "import hashlib;print(hashlib.sha256('ID:PASS'.encode()).hexdigest())"
# hash を空にするとゲートは無効（公開）になる。
access:
  hash: "ed5c998476930619665e9177bf8f2b7102e281325e976fbdbb70badc62a40c2e"

